<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刚强众生对话场 · 龙虾 vs 六大刚强众生</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Serif+SC:wght@400;600;700&family=LXGW+WenKai:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-primary: #0c0b14;
  --bg-secondary: #12101e;
  --bg-card: rgba(255,255,255,0.04);
  --text-primary: #ece4d9;
  --text-secondary: rgba(236,228,217,0.55);
  --text-dim: rgba(236,228,217,0.3);
  --border-light: rgba(236,228,217,0.08);
  --border-glow: rgba(236,228,217,0.15);
  --amber: #c9a84c;
  --amber-dim: rgba(201,168,76,0.25);
  --lobster-glow: rgba(135,206,235,0.15);

  /* Agent Colors */
  --c-greed: #d4a017;
  --c-greed-bg: rgba(212,160,23,0.12);
  --c-ignorance: #8b7355;
  --c-ignorance-bg: rgba(139,115,85,0.12);
  --c-attachment: #c08080;
  --c-attachment-bg: rgba(192,128,128,0.12);
  --c-anger: #e25822;
  --c-anger-bg: rgba(226,88,34,0.12);
  --c-pride: #8a4ad9;
  --c-pride-bg: rgba(138,74,217,0.12);
  --c-doubt: #5f9ea0;
  --c-doubt-bg: rgba(95,158,160,0.12);

  --font-title: 'ZCOOL QingKe HuangYou', cursive;
  --font-heading: 'Noto Serif SC', serif;
  --font-body: 'LXGW WenKai', 'Noto Sans SC', sans-serif;
}

html { font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow-x: hidden;
  position: relative;
}

/* ===== Ambient Background ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(135,206,235,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(138,74,217,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ===== Floating Particles ===== */
@keyframes float-up {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.06; }
  90% { opacity: 0.06; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}
.particle { position:fixed; width:2px; height:2px; background:var(--amber); border-radius:50%; pointer-events:none; z-index:0; }
.particle:nth-child(1) { left:10%; animation:float-up 28s linear infinite; animation-delay:0s; }
.particle:nth-child(2) { left:25%; animation:float-up 35s linear infinite; animation-delay:5s; }
.particle:nth-child(3) { left:45%; animation:float-up 24s linear infinite; animation-delay:2s; }
.particle:nth-child(4) { left:60%; animation:float-up 30s linear infinite; animation-delay:8s; }
.particle:nth-child(5) { left:75%; animation:float-up 26s linear infinite; animation-delay:3s; }
.particle:nth-child(6) { left:90%; animation:float-up 32s linear infinite; animation-delay:7s; }
.particle:nth-child(7) { left:35%; animation:float-up 22s linear infinite; animation-delay:10s; }
.particle:nth-child(8) { left:55%; animation:float-up 38s linear infinite; animation-delay:1s; }
.particle:nth-child(9) { left:15%; animation:float-up 27s linear infinite; animation-delay:12s; }
.particle:nth-child(10) { left:80%; animation:float-up 33s linear infinite; animation-delay:6s; }

/* ===== App Container ===== */
.app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 960px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 28px;
  box-shadow:
    0 0 0 1px rgba(236,228,217,0.03),
    0 24px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(201,168,76,0.04);
  overflow: hidden;
  backdrop-filter: blur(2px);
}

/* ===== Header ===== */
.header {
  padding: 40px 40px 32px;
  text-align: center;
  position: relative;
  border-bottom: 1px solid var(--border-light);
}
.header::after {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
}
.header-icon {
  font-size: 36px;
  margin-bottom: 12px;
  display: block;
  filter: drop-shadow(0 0 12px rgba(135,206,235,0.3));
  animation: pulse-icon 3s ease-in-out infinite;
}
@keyframes pulse-icon {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(135,206,235,0.3)); }
  50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(135,206,235,0.5)); }
}
.header h1 {
  font-family: var(--font-title);
  font-size: 2rem;
  letter-spacing: 0.08em;
  color: var(--text-primary);
  font-weight: 400;
}
.header h1 span { color: var(--amber); }
.header .subtitle {
  font-family: var(--font-heading);
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-top: 8px;
  letter-spacing: 0.15em;
}
.header .divider {
  width: 48px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
  margin: 16px auto 0;
}

/* ===== Agent Selection ===== */
.agents-section {
  padding: 28px 40px 24px;
  border-bottom: 1px solid var(--border-light);
}
.agents-label {
  font-family: var(--font-heading);
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  margin-bottom: 16px;
  text-transform: uppercase;
}
.agents-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
}
.agent-card {
  position: relative;
  padding: 18px 10px 14px;
  border-radius: 16px;
  border: 1px solid var(--border-light);
  background: var(--bg-card);
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  text-align: center;
  overflow: hidden;
  user-select: none;
}
.agent-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.35s;
  border-radius: 16px;
}
.agent-card:hover {
  border-color: var(--border-glow);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.agent-card:hover::before { opacity: 1; }
.agent-card:active { transform: translateY(-1px); }

.agent-card .avatar { font-size: 24px; display: block; margin-bottom: 6px; position: relative; }
.agent-card .name {
  font-family: var(--font-heading);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-primary);
  display: block;
  position: relative;
}
.agent-card .epithet {
  font-size: 0.62rem;
  color: var(--text-dim);
  display: block;
  margin-top: 2px;
  position: relative;
}

/* Agent-specific colors on hover/active */
.agent-card[data-id="wang"]:hover { border-color: var(--c-greed); background: var(--c-greed-bg); }
.agent-card[data-id="wang"].active { border-color: var(--c-greed); background: var(--c-greed-bg); box-shadow: 0 0 20px rgba(212,160,23,0.15); }
.agent-card[data-id="wang"].active .name { color: var(--c-greed); }

.agent-card[data-id="li"]:hover { border-color: var(--c-ignorance); background: var(--c-ignorance-bg); }
.agent-card[data-id="li"].active { border-color: var(--c-ignorance); background: var(--c-ignorance-bg); box-shadow: 0 0 20px rgba(139,115,85,0.15); }
.agent-card[data-id="li"].active .name { color: var(--c-ignorance); }

.agent-card[data-id="zhang"]:hover { border-color: var(--c-attachment); background: var(--c-attachment-bg); }
.agent-card[data-id="zhang"].active { border-color: var(--c-attachment); background: var(--c-attachment-bg); box-shadow: 0 0 20px rgba(192,128,128,0.15); }
.agent-card[data-id="zhang"].active .name { color: var(--c-attachment); }

.agent-card[data-id="zhao"]:hover { border-color: var(--c-anger); background: var(--c-anger-bg); }
.agent-card[data-id="zhao"].active { border-color: var(--c-anger); background: var(--c-anger-bg); box-shadow: 0 0 20px rgba(226,88,34,0.15); }
.agent-card[data-id="zhao"].active .name { color: var(--c-anger); }

.agent-card[data-id="liu"]:hover { border-color: var(--c-pride); background: var(--c-pride-bg); }
.agent-card[data-id="liu"].active { border-color: var(--c-pride); background: var(--c-pride-bg); box-shadow: 0 0 20px rgba(138,74,217,0.15); }
.agent-card[data-id="liu"].active .name { color: var(--c-pride); }

.agent-card[data-id="chen"]:hover { border-color: var(--c-doubt); background: var(--c-doubt-bg); }
.agent-card[data-id="chen"].active { border-color: var(--c-doubt); background: var(--c-doubt-bg); box-shadow: 0 0 20px rgba(95,158,160,0.15); }
.agent-card[data-id="chen"].active .name { color: var(--c-doubt); }

/* ===== Chat Area ===== */
.chat-area {
  display: flex;
  flex-direction: column;
  height: 520px;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 40px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
.chat-messages::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }

/* ===== Messages ===== */
.message {
  margin-bottom: 24px;
  animation: msg-in 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes msg-in {
  0% { opacity: 0; transform: translateY(16px) scale(0.97); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.message-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.message-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  flex-shrink: 0;
}
.message-sender {
  font-family: var(--font-heading);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-primary);
}
.message-time {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-left: auto;
}
.message-body {
  margin-left: 42px;
  padding: 14px 18px;
  border-radius: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  line-height: 1.75;
  font-size: 0.88rem;
  color: var(--text-primary);
  position: relative;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
  max-width: 100%;
}

/* Lobster message style */
.message.lobster .message-avatar {
  background: rgba(135,206,235,0.12);
  border-color: rgba(135,206,235,0.25);
}
.message.lobster .message-body {
  background: linear-gradient(135deg, rgba(135,206,235,0.06) 0%, rgba(135,206,235,0.02) 100%);
  border-color: rgba(135,206,235,0.15);
  box-shadow: 0 0 24px rgba(135,206,235,0.04), inset 0 1px 0 rgba(135,206,235,0.06);
}
.message.lobster .message-sender { color: #87ceeb; }

/* Agent message colors */
.message.wang .message-avatar { border-color: rgba(212,160,23,0.3); }
.message.wang .message-body { border-left: 2px solid rgba(212,160,23,0.3); }
.message.li .message-avatar { border-color: rgba(139,115,85,0.3); }
.message.li .message-body { border-left: 2px solid rgba(139,115,85,0.3); }
.message.zhang .message-avatar { border-color: rgba(192,128,128,0.3); }
.message.zhang .message-body { border-left: 2px solid rgba(192,128,128,0.3); }
.message.zhao .message-avatar { border-color: rgba(226,88,34,0.3); }
.message.zhao .message-body { border-left: 2px solid rgba(226,88,34,0.3); }
.message.liu .message-avatar { border-color: rgba(138,74,217,0.3); }
.message.liu .message-body { border-left: 2px solid rgba(138,74,217,0.3); }
.message.chen .message-avatar { border-color: rgba(95,158,160,0.3); }
.message.chen .message-body { border-left: 2px solid rgba(95,158,160,0.3); }

/* ===== System Message ===== */
.system-message {
  text-align: center;
  padding: 20px 0;
  font-size: 0.78rem;
  color: var(--text-dim);
}
.system-msg-block {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  font-family: var(--font-heading);
  font-size: 0.72rem;
  color: var(--text-secondary);
}

/* ===== Typing Indicator ===== */
.typing-bar {
  padding: 12px 40px;
  border-top: 1px solid var(--border-light);
  display: none;
  align-items: center;
  gap: 12px;
  min-height: 44px;
}
.typing-bar.active { display: flex; }
.typing-dots {
  display: flex;
  gap: 4px;
}
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dot-bounce {
  0%, 60%, 100% { transform: translateY(0); background: var(--text-dim); }
  30% { transform: translateY(-6px); background: var(--amber); }
}
.typing-text {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-family: var(--font-heading);
}

/* ===== Bottom Bar ===== */
.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 40px;
  border-top: 1px solid var(--border-light);
  background: rgba(12,11,20,0.6);
}
.btn-stop {
  padding: 10px 24px;
  border: 1px solid rgba(226,88,34,0.3);
  border-radius: 12px;
  background: rgba(226,88,34,0.08);
  color: #e25822;
  font-family: var(--font-heading);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-stop:hover {
  background: rgba(226,88,34,0.18);
  border-color: rgba(226,88,34,0.5);
  box-shadow: 0 0 20px rgba(226,88,34,0.1);
}
.btn-stop:active { transform: scale(0.96); }

.status-items {
  display: flex;
  gap: 20px;
  font-size: 0.7rem;
  color: var(--text-dim);
  font-family: var(--font-heading);
}
.status-items span { display: flex; align-items: center; gap: 4px; }
.status-items .label { color: var(--text-dim); }
.status-items .value { color: var(--text-secondary); }

/* ===== Scrollbar ===== */
.chat-messages:empty::after {
  content: '请选择一位对手，开始对话';
  display: block;
  text-align: center;
  padding: 60px 0;
  color: var(--text-dim);
  font-family: var(--font-heading);
  font-size: 0.85rem;
  letter-spacing: 0.04em;
}

/* ===== Responsive ===== */
@media (max-width: 800px) {
  body { padding: 12px; }
  .app { border-radius: 20px; }
  .header { padding: 28px 24px 24px; }
  .header h1 { font-size: 1.5rem; }
  .agents-section { padding: 20px 24px 18px; }
  .agents-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .agent-card { padding: 14px 8px 10px; }
  .agent-card .avatar { font-size: 20px; }
  .chat-area { height: 440px; }
  .chat-messages { padding: 16px 24px; }
  .typing-bar { padding: 10px 24px; }
  .bottom-bar { padding: 12px 24px; flex-wrap: wrap; gap: 10px; }
  .status-items { gap: 12px; }
}
@media (max-width: 480px) {
  .agents-grid { grid-template-columns: repeat(2, 1fr); }
  .header h1 { font-size: 1.2rem; }
  .chat-area { height: 360px; }
  .message-body { margin-left: 0; margin-top: 8px; }
}
</style>
</head>

<!-- ===== App ===== -->
<div class="app">

  <section class="agents-section">

</div>

<script>
// ===== Configuration =====
const IS_FILE_PROTOCOL = window.location.protocol === 'file:';
const CONFIG = {
  relayEndpoint: window.location.origin + '/api/chat',
  corsProxy: IS_FILE_PROTOCOL ? 'https://corsproxy.io/?' : null,

  historyWindow: 10

  },
  li: {

    epithet: '执迷不悟',
    systemPrompt: '你是李博文，一个知识分子书呆子，理论一套套。你性格死板、教条、钻牛角尖，执着于理论，不懂灵活运用。你说话引经据典，充满学究气。回复限制在100字以内。'
  },
  zhang: {

// Build the actual system prompt dynamically
function buildLobsterPrompt(agentId) {
  const p = LOBSTER.persona[agentId] || '';
  const l = LOBSTER.longing[agentId] || '';
  return [
    LOBSTER.identity,
    '【性格】' + p,
    '【他的需求】' + l,
    '【立场动作】' + LOBSTER.moves.join('；'),
    '【语言节奏】' + LOBSTER.rhythm,
    '【结束规则】' + LOBSTER.ending,
    '【总则】' + LOBSTER.golden_rule,
    '每次回复不超过100字。'
  ].join('\n');
}

// For backward compatibility (selectAgent needs it)
const LOBSTER_PROMPT = LOBSTER.identity + ' ' + LOBSTER.golden_rule;

// ===== State =====
let state = {
  currentAgent: null,
  chatHistory: [],
  roundCount: 0,
  isProcessing: false,
  isStopped: false
};

// ===== DOM Cache =====
const $ = id => document.getElementById(id);
const chatMessages = $('chatMessages');
const typingBar = $('typingBar');
const typingText = $('typingText');
const statusText = $('statusText');
const messageCount = $('messageCount');
const roundCount = $('roundCount');
const stopBtn = $('stopBtn');

// ===== API (auto-detect: relay vs CORS proxy) =====
async function callDeepSeek(messages) {
  const body = {
    model: CONFIG.deepseekModel,
    messages: messages,
    max_tokens: CONFIG.maxTokens
  };

  let url, headers;
  if (IS_FILE_PROTOCOL) {
    // 从 file:// 打开 → 通过 CORS 代理转发
    url = CONFIG.corsProxy + encodeURIComponent('https://api.deepseek.com/v1/chat/completions');
    headers = {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + CONFIG.deepseekApiKey
    };
  } else {
    // 从 http:// 打开（有后端）→ 走本地 relay
    url = CONFIG.relayEndpoint;
    headers = { 'Content-Type': 'application/json' };
  }

  const res = await fetch(url, {
    method: 'POST',
    headers: headers,
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('API 响应异常 (' + res.status + ')');
  const data = await res.json();
  return (data.choices && data.choices[0] && data.choices[0].message)
    ? data.choices[0].message.content
    : '（没有回应）';
}

// ===== Chat Logic =====
function selectAgent(agentId) {
  if (state.isProcessing) return;
  state.isProcessing = true;
  state.isStopped = false;

  // Reset
  state.currentAgent = AGENTS[agentId];
  state.chatHistory = [];
  state.roundCount = 0;

  // UI - agent selection
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
  document.querySelector('.agent-card[data-id="' + agentId + '"]').classList.add('active');

  // UI - messages
  chatMessages.innerHTML = '';
  updateStats();
  statusText.textContent = '对话中';
  stopBtn.disabled = false;

  state.isProcessing = false;

  // Start with agent speaking
  addSystemMessage(state.currentAgent.avatar + ' ' + state.currentAgent.name + '（' + state.currentAgent.desc + '）出场了');
  setTimeout(() => agentSpeak('开始对话吧。'), 800);
}

function addMessage(sender, senderName, content) {
  const msg = {
    sender: sender,
    senderName: senderName,
    content: content,
    time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
  };
  state.chatHistory.push(msg);
  displayMessage(msg);
  updateStats();
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'system-message';
  div.innerHTML = '<span class="system-msg-block">' + escapeHtml(text) + '</span>';
  chatMessages.appendChild(div);
  scrollBottom();
}

function displayMessage(msg) {
  const div = document.createElement('div');
  div.className = 'message ' + msg.sender;

  div.innerHTML =
    '<div class="message-header">' +
      '<div class="message-avatar">' + msg.senderName.charAt(0) + '</div>' +
      '<div class="message-sender">' + escapeHtml(msg.senderName) + '</div>' +
      '<div class="message-time">' + msg.time + '</div>' +
    '</div>' +
    '<div class="message-body">' + escapeHtml(msg.content) + '</div>';

  chatMessages.appendChild(div);
  scrollBottom();
}

function agentSpeak(lastMessage) {
  if (!state.currentAgent || state.isStopped) return;
  showTyping(state.currentAgent.name + ' 正在酝酿...');

  const messages = [
    { role: 'system', content: state.currentAgent.systemPrompt }
  ];
  const recent = state.chatHistory.slice(-CONFIG.historyWindow);
  recent.forEach(m => {
    if (m.sender === 'lobster') messages.push({ role: 'user', content: m.content });
    else if (m.sender === state.currentAgent.id) messages.push({ role: 'assistant', content: m.content });
  });
  messages.push({ role: 'user', content: lastMessage || '请开始。' });

  callDeepSeek(messages)
    .then(reply => {
      hideTyping();
      addMessage(state.currentAgent.id, state.currentAgent.avatar + ' ' + state.currentAgent.name, reply);
      setTimeout(() => lobsterSpeak(reply), CONFIG.responseDelay);
    })
    .catch(err => {
      hideTyping();
      addMessage(state.currentAgent.id, state.currentAgent.avatar + ' ' + state.currentAgent.name, '（调用暂时卡住了: ' + err.message + '）');
      statusText.textContent = '对话中断';
    });
}

function lobsterSpeak(lastMessage) {
  if (!state.currentAgent || state.isStopped) return;
  showTyping('🦞 龙虾正在思量...');

  const messages = [
    { role: 'system', content: buildLobsterPrompt(state.currentAgent.id) }
  ];
  const recent = state.chatHistory.slice(-CONFIG.historyWindow);
  recent.forEach(m => {
    if (m.sender === state.currentAgent.id) messages.push({ role: 'user', content: m.content });
    else if (m.sender === 'lobster') messages.push({ role: 'assistant', content: m.content });
  });
  messages.push({ role: 'user', content: lastMessage || '请开始。' });

  callDeepSeek(messages)
    .then(reply => {
      hideTyping();
      state.roundCount++;

      // 检测结束信号
      const cleanReply = reply.replace('[END]', '').trim();
      if (reply.includes('[END]') || state.roundCount >= 20) {
        addMessage('lobster', '🦞 龙虾', cleanReply);
        updateStats();
        addSystemMessage('☯ 对话圆满结束');
        state.isStopped = true;
        statusText.textContent = '已结束（共识达成）';
        stopBtn.disabled = true;
        document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
        return;
      }

      addMessage('lobster', '🦞 龙虾', cleanReply);
      updateStats();
      setTimeout(() => agentSpeak(reply), CONFIG.responseDelay);
    })
    .catch(err => {
      hideTyping();
      addMessage('lobster', '🦞 龙虾', '（龙虾暂时沉默了: ' + err.message + '）');
      statusText.textContent = '对话中断';
    });
}

function stopChat() {
  state.isStopped = true;
  hideTyping();
  addSystemMessage('⚡ 对话已停止');
  statusText.textContent = '已停止';
  stopBtn.disabled = true;
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
}

// ===== UI Helpers =====
function showTyping(text) {
  typingText.textContent = text;
  typingBar.classList.add('active');
}

function hideTyping() {
  typingBar.classList.remove('active');
}

function updateStats() {
  messageCount.textContent = state.chatHistory.length;
  roundCount.textContent = state.roundCount;
}

function scrollBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
